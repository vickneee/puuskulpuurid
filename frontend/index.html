<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon_io/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary meta description for SEO and social previews -->
    <meta name="description" content="Puuskulptuurid - käsitsi valmistatud puidust skulptuurid ja aiaskulptuurid. Iga puuskulptuur on valmistatud naturaalsest puidust kannatlikkuse ja kirega." />
    <!-- Instruct crawlers to index and follow by default -->
    <meta name="robots" content="index, follow" />

    <!-- Inline theme preflight: read saved preference and set the document class before styles load
         This ensures a user-selected light theme is respected even if the system prefers dark. -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("theme");

          if (
                  theme === "dark" ||
                  (!theme &&
                          window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Puuskulptuurid" />
    <meta property="og:description" content="Puuskulptuurid — käsitsi valmistatud puidust skulptuurid ja aiaskulptuurid. Iga puuskulptuur on valmistatud naturaalsest puidust kannatlikkuse ja kirega." />
    <meta property="og:type" content="website" />
    <!-- Replace the image URL below with a production preview image if you have one -->
